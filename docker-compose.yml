version: "3.9"

volumes:
  data_cache:
  checkpoints:
  metrics:
  logs:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # FastAPI Backend
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - data_cache:/app/data/cache
      - checkpoints:/app/checkpoints
      - metrics:/app/metrics
      - logs:/app/logs
    env_file:
      - backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # SPT Model Training (run manually: docker-compose run train-spt)
  # ──────────────────────────────────────────────────────────────────────────
  train-spt:
    build: .
    command: python train.py --model spt_model
    volumes:
      - data_cache:/app/data/cache
      - checkpoints:/app/checkpoints
      - metrics:/app/metrics
      - logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    profiles: [train]

  # ──────────────────────────────────────────────────────────────────────────
  # Functional SPT Training (run manually)
  # ──────────────────────────────────────────────────────────────────────────
  train-functional-spt:
    build: .
    command: python train.py --model functional_spt
    volumes:
      - data_cache:/app/data/cache
      - checkpoints:/app/checkpoints
      - metrics:/app/metrics
      - logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    profiles: [train]

  # ──────────────────────────────────────────────────────────────────────────
  # Next.js Frontend (dev server)
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    profiles: [frontend]
