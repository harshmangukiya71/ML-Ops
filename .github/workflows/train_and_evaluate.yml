name: Train & Evaluate Portfolio Models

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  train-spt:
    name: Train SPT Model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache market data
        uses: actions/cache@v4
        with:
          path: data/cache
          key: market-data-${{ hashFiles('config/spt_model.yaml') }}

      - name: Train SPT Model
        run: python train.py --model spt_model
        # Fails if Sharpe < sharpe_threshold in config

      - name: Upload checkpoint and metrics
        uses: actions/upload-artifact@v4
        with:
          name: spt-model-artifacts
          path: |
            checkpoints/spt_model_best.pt
            metrics/

  train-functional-spt:
    name: Train Functional SPT
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache market data
        uses: actions/cache@v4
        with:
          path: data/cache
          key: market-data-${{ hashFiles('config/functional_spt.yaml') }}

      - name: Train Functional SPT
        run: python train.py --model functional_spt
        # Fails if Sharpe < sharpe_threshold in config

      - name: Upload checkpoint and metrics
        uses: actions/upload-artifact@v4
        with:
          name: functional-spt-artifacts
          path: |
            checkpoints/functional_spt_best.pt
            metrics/
